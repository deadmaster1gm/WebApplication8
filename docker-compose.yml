services:
  postgres:
    image: postgres:18
    container_name: myapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: myapi_db
      POSTGRES_USER: myapi_user
      POSTGRES_PASSWORD: myapi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: